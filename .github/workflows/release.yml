name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build, validate, and pack release artifact
        run: npm run release:pack

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: srgical-release-bundle
          path: .artifacts/release/

      - name: Publish npm package
        if: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish GitHub release artifacts
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .artifacts/release/*.tgz
            .artifacts/release/release-manifest.json
            .artifacts/release/release-manifest.md
