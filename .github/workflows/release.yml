name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@launcheleven"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Set git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Read release state
        id: release_version
        run: npm run --silent release:state >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        if: ${{ steps.release_version.outputs.already_tagged != 'true' }}
        run: npm run release:pack

      - name: Publish GitHub package
        if: ${{ steps.release_version.outputs.already_tagged != 'true' }}
        id: publish_github
        run: npm run publish:github
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js for npmjs
        if: ${{ steps.release_version.outputs.already_tagged != 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: "@launch11"

      - name: Publish npm package
        if: ${{ steps.release_version.outputs.already_tagged != 'true' }}
        id: publish_npm
        run: npm run publish:npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_PUBLIC_PACKAGE_NAME: "@launch11/srgical"
          NPM_PUBLIC_REGISTRY: https://registry.npmjs.org/
          NPM_PUBLIC_ACCESS: public

      - name: Create git tag
        if: ${{ steps.release_version.outputs.already_tagged != 'true' }}
        run: |
          git tag "${{ steps.release_version.outputs.tag }}"
          git push origin "${{ steps.release_version.outputs.tag }}"

      - name: Create GitHub release
        if: ${{ steps.release_version.outputs.already_tagged != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.tag }}
          generate_release_notes: true
          files: .artifacts/release/*

      - name: Upload release artifact
        if: ${{ steps.release_version.outputs.already_tagged != 'true' && success() }}
        uses: actions/upload-artifact@v4
        with:
          name: srgical-release-${{ github.run_number }}
          path: .artifacts/release/
