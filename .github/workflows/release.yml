name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: "@launcheleven"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Set git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Version packages
        run: npm run version-packages

      - name: Commit version changes
        id: version_commit
        run: |
          if git diff --quiet; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git add -A package.json package-lock.json CHANGELOG.md .changeset
          git commit -m "chore: release packages [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Publish packages
        id: publish
        run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read release version
        id: release_version
        run: echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Create git tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v${{ steps.release_version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.release_version.outputs.version }} already exists on origin."
            exit 0
          fi

          git tag "v${{ steps.release_version.outputs.version }}"
          git push origin "v${{ steps.release_version.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release_version.outputs.version }}
          generate_release_notes: true
          files: .artifacts/release/*

      - name: Upload release artifact
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: srgical-release-${{ github.run_number }}
          path: .artifacts/release/
